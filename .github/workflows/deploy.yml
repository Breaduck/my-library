name: Build and deploy to Cloudflare Pages

on:
  push:
    branches: [master]
    paths-ignore:
      - 'dist/**'
      - '.github/**'

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - run: npm run build
        env:
          VITE_GOOGLE_CLIENT_ID: ${{ secrets.NEXT_PUBLIC_GOOGLE_CLIENT_ID }}

      - name: Commit dist
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add dist
          if git diff --staged --quiet; then
            echo "No changes in dist/"
          else
            git commit -m "build: update dist [skip ci]"
            git push
          fi

      - name: Deploy via Wrangler (optional, requires CF secrets)
        if: ${{ env.CLOUDFLARE_API_TOKEN != '' }}
        run: npx wrangler pages deploy dist --project-name=my-library --commit-dirty=true
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
